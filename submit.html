<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit | Aletheia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } h1, h2, h3, .font-serif { font-family: 'Merriweather', serif; } </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col">

    <nav class="bg-white w-full z-50 py-4 border-b border-slate-200 shrink-0">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="font-serif text-2xl font-bold tracking-wider">ALETHEIA.</a>
            <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-amber-600">&larr; Return to Home</a>
        </div>
    </nav>

    <div class="flex-grow flex flex-col md:flex-row w-full h-full">
        <div class="hidden md:block md:w-1/2 relative">
            <img src="https://images.unsplash.com/photo-1455390582262-044cdead2708?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-slate-900/40"></div>
            <div class="absolute bottom-10 left-10 right-10 text-white">
                <h2 class="text-3xl font-serif font-bold mb-2">Call for Papers</h2>
                <p class="text-slate-200">We are currently accepting manuscripts for our Winter 2026 publication focusing on Epistemology and Digital Realities.</p>
            </div>
        </div>

        <div class="w-full md:w-1/2 p-8 md:p-16 overflow-y-auto bg-white">
            <div class="max-w-md mx-auto">
                <h1 class="text-3xl font-serif font-bold text-slate-900 mb-2">Submit Your Work</h1>
                <p class="text-slate-500 mb-8 text-sm">Please fill out the form below to submit your manuscript to our editorial board. We respond within 4-6 weeks.</p>

                <form onsubmit="handleSubmission(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                        <input type="text" name="author_name" required class="w-full px-4 py-2 border border-slate-300 rounded-sm focus:ring-amber-500 focus:border-amber-500 outline-none transition-shadow">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Academic Affiliation (Optional)</label>
                        <input type="text" name="affiliation" class="w-full px-4 py-2 border border-slate-300 rounded-sm focus:ring-amber-500 focus:border-amber-500 outline-none transition-shadow">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                        <input type="email" name="author_email" required class="w-full px-4 py-2 border border-slate-300 rounded-sm focus:ring-amber-500 focus:border-amber-500 outline-none transition-shadow">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Manuscript Title</label>
                        <input type="text" name="paper_title" required class="w-full px-4 py-2 border border-slate-300 rounded-sm focus:ring-amber-500 focus:border-amber-500 outline-none transition-shadow">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Abstract</label>
                        <textarea name="abstract" rows="4" required class="w-full px-4 py-2 border border-slate-300 rounded-sm focus:ring-amber-500 focus:border-amber-500 outline-none transition-shadow"></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white py-3 rounded-sm font-medium hover:bg-amber-600 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2">
                        Submit Manuscript
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
